<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Detail - IT Service Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="top-nav">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span class="logo-text">IT Service Portal</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="tickets.html" class="active">Tickets</a></li>
      <li data-role="user,admin"><a href="new-ticket.html">New Ticket</a></li>
      <li data-role="approver,admin"><a href="approvals.html">Approvals</a></li>
      <li data-role="user,admin"><a href="catalog.html">Service Catalog</a></li>
    </ul>
    <div class="nav-right">
      <span id="roleBadge" class="role-badge"></span>
      <button class="settings-btn" onclick="showSettings()" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      </button>
    </div>
  </nav>

  <div class="main-content">
    <div style="margin-bottom:16px">
      <a href="tickets.html" style="color:var(--primary);text-decoration:none;font-size:14px;">← Back to Tickets</a>
    </div>

    <!-- Ticket Header -->
    <div class="card" id="ticketHeader">
      <div class="loading"><div class="spinner"></div>Loading ticket...</div>
    </div>

    <!-- Two Column Layout -->
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">

      <!-- Left: Description & Comments -->
      <div>
        <div class="card" id="ticketBody">
          <div class="card-header"><h2>Description</h2></div>
          <div id="ticketDescription" style="white-space:pre-wrap;font-size:14px;line-height:1.7;"></div>
        </div>

        <!-- Approval Panel (shown for change/service requests needing approval) -->
        <div class="card" id="approvalPanel" style="display:none;">
          <div class="card-header">
            <h2>⚡ Approval Decision</h2>
          </div>
          <div id="approvalContent"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>Activity</h2>
          </div>
          <div id="ticketComments">
            <div class="loading"><div class="spinner"></div>Loading...</div>
          </div>

          <!-- Add Comment -->
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-200);">
            <div class="form-group">
              <label>Add a Comment</label>
              <textarea id="newComment" placeholder="Write your update here..." style="min-height:80px"></textarea>
            </div>
            <button class="btn btn-primary btn-sm" onclick="addComment()">Post Comment</button>
          </div>
        </div>
      </div>

      <!-- Right: Sidebar -->
      <div>
        <div class="card">
          <h3 style="font-size:14px;color:var(--gray-500);margin-bottom:12px;">DETAILS</h3>
          <div id="ticketSidebar" style="font-size:14px;">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>

        <div class="card">
          <h3 style="font-size:14px;color:var(--gray-500);margin-bottom:12px;">ACTIONS</h3>
          <div style="display:flex;flex-direction:column;gap:8px;" id="ticketActions"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>⚙️ Portal Settings</h2>
      <div class="form-group">
        <label>Organization Name</label>
        <input type="text" id="settingsOrg" placeholder="My Company IT Portal">
      </div>
      <div class="form-group">
        <label>GitHub Repository <span class="required">*</span></label>
        <input type="text" id="settingsRepo" placeholder="owner/repo">
      </div>
      <div class="form-group">
        <label>GitHub Token <span class="required">*</span></label>
        <input type="password" id="settingsToken" placeholder="ghp_...">
      </div>
      <div class="form-group">
        <label>GitHub Username <span class="required">*</span></label>
        <input type="text" id="settingsUsername" placeholder="your-github-username">
      </div>
      <div class="form-group">
        <label>Role <span class="required">*</span></label>
        <select id="settingsRole">
          <option value="user">👤 General User</option>
          <option value="approver">✅ Approver</option>
          <option value="admin">🛡️ Admin</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
        <button class="btn btn-secondary" onclick="hideSettings()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/github-api.js"></script>
  <script>
    document.querySelector('.logo-text').textContent = ITSM.config.orgName;
    applyRoleUI();
    const ticketId = new URLSearchParams(location.search).get('id');
    let currentTicket = null;

    async function loadPageData() {
      if (!checkConfig() || !ticketId) return;

      try {
        const [ticket, comments] = await Promise.all([
          ITSM.getTicket(ticketId),
          ITSM.getTicketComments(ticketId)
        ]);
        currentTicket = ticket;
        document.title = `#${ticket.number} ${ticket.title} - IT Service Portal`;

        const type = ITSM.getTicketType(ticket);
        const priority = ITSM.getPriority(ticket);
        const sla = ITSM.getSLAStatus(ticket);
        const isOpen = ticket.state === 'open';

        // Header
        document.getElementById('ticketHeader').innerHTML = `
          <div class="ticket-detail-header">
            <div>
              <div class="ticket-id">#${ticket.number}</div>
              <div class="ticket-title">${ticket.title}</div>
              <div class="ticket-meta">
                <span><span class="badge badge-${type}">${type}</span></span>
                <span><span class="badge badge-${priority}">${priority}</span></span>
                <span><span class="badge badge-${isOpen ? 'open' : 'closed'}">${isOpen ? 'Open' : 'Closed'}</span></span>
                ${sla !== 'ok' ? `<span><span class="badge badge-${sla === 'breached' ? 'breached' : 'warning'}">${sla === 'breached' ? 'SLA Breached' : 'SLA Warning'}</span></span>` : ''}
              </div>
            </div>
          </div>
        `;

        // Description (parse markdown-like content)
        const body = ticket.body || 'No description provided.';
        document.getElementById('ticketDescription').innerHTML = formatMarkdown(body);

        // Sidebar
        document.getElementById('ticketSidebar').innerHTML = `
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Created</div>
            <div>${ITSM.formatDate(ticket.created_at)}</div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Updated</div>
            <div>${ITSM.formatDate(ticket.updated_at)}</div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Assignee</div>
            <div>${ticket.assignee ? ticket.assignee.login : 'Unassigned'}</div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Labels</div>
            <div>${ticket.labels.map(l => `<span class="badge" style="background:#${l.color}22;color:#${l.color};border:1px solid #${l.color}44;margin:2px;">${l.name}</span>`).join(' ')}</div>
          </div>
        `;

        // Actions (admin can resolve; users can resolve their own; approvers see nothing here)
        const actions = document.getElementById('ticketActions');
        const canResolve = ITSM.config.isAdmin || 
          (ITSM.config.isUser && ticket.user && ticket.user.login.toLowerCase() === ITSM.config.username.toLowerCase());
        if (isOpen && canResolve) {
          actions.innerHTML = `
            <button class="btn btn-success btn-sm" onclick="resolveTicket()">✅ Resolve Ticket</button>
          `;
        } else if (!isOpen) {
          actions.innerHTML = `<div style="color:var(--gray-400);font-size:13px;">This ticket is closed.</div>`;
        } else {
          actions.innerHTML = `<div style="color:var(--gray-400);font-size:13px;">No actions available for your role.</div>`;
        }

        // Approval Panel — only for approvers and admins
        const showApprovalUI = ITSM.config.isAdmin || ITSM.config.isApprover;
        const approval = await ITSM.getApprovalStatus(ticket);
        const approvalPanel = document.getElementById('approvalPanel');
        const approvalContent = document.getElementById('approvalContent');

        if (approval.needsApproval) {
          approvalPanel.style.display = 'block';

          if (approval.isPending && showApprovalUI) {
            approvalContent.innerHTML = `
              <div class="approval-status-banner approval-pending">
                <span class="approval-icon">⏳</span>
                <div>
                  <strong>Pending Approval</strong>
                  <div style="font-size:13px;margin-top:2px;">This ${approval.type.toLowerCase()} requires approval before implementation.</div>
                </div>
              </div>

              ${approval.riskLevel !== 'unknown' ? `
              <div style="margin:12px 0;padding:10px 14px;background:var(--gray-50);border-radius:8px;font-size:13px;">
                <strong>Risk Level:</strong> <span class="badge badge-${approval.riskLevel === 'high' ? 'critical' : approval.riskLevel === 'medium' ? 'warning' : 'open'}">${approval.riskLevel.toUpperCase()}</span>
                ${approval.changeType ? ` &nbsp;|&nbsp; <strong>Type:</strong> ${approval.changeType.replace('-', ' ').replace(/\b\w/g, c => c.toUpperCase())}` : ''}
              </div>` : ''}

              <div class="form-group" style="margin-top:16px;">
                <label for="approverComment">Approver Comments</label>
                <textarea id="approverComment" placeholder="Enter your review comments, conditions, or reason for rejection..." style="min-height:100px;"></textarea>
              </div>

              <div class="approval-actions">
                <button class="btn approval-btn-approve" onclick="approveTicket()">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                  Approve
                </button>
                <button class="btn approval-btn-reject" onclick="rejectTicket()">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                  Reject
                </button>
              </div>
            `;
          } else if (approval.isPending && !showApprovalUI) {
            // General user sees pending status but no approve/reject buttons
            approvalContent.innerHTML = `
              <div class="approval-status-banner approval-pending">
                <span class="approval-icon">⏳</span>
                <div>
                  <strong>Awaiting Approval</strong>
                  <div style="font-size:13px;margin-top:2px;">This ${approval.type.toLowerCase()} is waiting for an approver to review it.</div>
                </div>
              </div>
            `;
          } else if (approval.isApproved) {
            approvalContent.innerHTML = `
              <div class="approval-status-banner approval-approved">
                <span class="approval-icon">✅</span>
                <div>
                  <strong>Approved</strong>
                  <div style="font-size:13px;margin-top:2px;">This ${approval.type.toLowerCase()} has been approved and can proceed with implementation.</div>
                </div>
              </div>
            `;
          } else if (approval.isRejected) {
            approvalContent.innerHTML = `
              <div class="approval-status-banner approval-rejected">
                <span class="approval-icon">❌</span>
                <div>
                  <strong>Rejected</strong>
                  <div style="font-size:13px;margin-top:2px;">This ${approval.type.toLowerCase()} has been rejected. See comments for details.</div>
                </div>
              </div>
            `;
          }
        }

        // Comments
        const commentsDiv = document.getElementById('ticketComments');
        if (comments.length === 0) {
          commentsDiv.innerHTML = '<div style="color:var(--gray-400);font-size:14px;padding:12px 0;">No activity yet.</div>';
        } else {
          commentsDiv.innerHTML = comments.map(c => `
            <div style="padding:12px 0;border-bottom:1px solid var(--gray-100);">
              <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <strong style="font-size:13px;">${c.user.login}</strong>
                <span style="font-size:12px;color:var(--gray-400);">${ITSM.timeAgo(c.created_at)}</span>
              </div>
              <div style="font-size:14px;white-space:pre-wrap;line-height:1.6;">${formatMarkdown(c.body)}</div>
            </div>
          `).join('');
        }

      } catch (err) {
        showToast('Error: ' + err.message, 'error');
        document.getElementById('ticketHeader').innerHTML = '<div class="empty-state">Ticket not found</div>';
      }
    }

    async function addComment() {
      const text = document.getElementById('newComment').value.trim();
      if (!text) { showToast('Please write a comment', 'error'); return; }
      try {
        await ITSM.addComment(ticketId, text);
        document.getElementById('newComment').value = '';
        showToast('Comment posted!', 'success');
        loadPageData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function resolveTicket() {
      if (!confirm('Are you sure you want to resolve this ticket?')) return;
      try {
        await ITSM.closeTicket(ticketId);
        showToast('Ticket resolved!', 'success');
        loadPageData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function approveTicket() {
      const comment = document.getElementById('approverComment').value.trim();
      if (!comment) {
        showToast('Please enter approver comments before approving.', 'error');
        return;
      }
      if (!confirm('Approve this request? This will allow implementation to proceed.')) return;
      try {
        const approvalBody = `## ✅ Approved\n\n**Decision:** Approved\n**Approver Comments:**\n${comment}\n\n---\n*Approved via ITSM Portal at ${new Date().toLocaleString()}*`;
        await ITSM.addComment(ticketId, approvalBody);
        await ITSM.addLabels(ticketId, ['approved']);
        // Try to remove pending-review label if it exists
        try { await ITSM.removeLabel(ticketId, 'pending-review'); } catch(e) {}
        showToast('Request approved successfully!', 'success');
        loadPageData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function rejectTicket() {
      const comment = document.getElementById('approverComment').value.trim();
      if (!comment) {
        showToast('Please enter a reason for rejection.', 'error');
        return;
      }
      if (!confirm('Reject this request? The requester will be notified.')) return;
      try {
        const rejectionBody = `## ❌ Rejected\n\n**Decision:** Rejected\n**Reason:**\n${comment}\n\n---\n*Rejected via ITSM Portal at ${new Date().toLocaleString()}*`;
        await ITSM.addComment(ticketId, rejectionBody);
        await ITSM.addLabels(ticketId, ['rejected']);
        try { await ITSM.removeLabel(ticketId, 'pending-review'); } catch(e) {}
        showToast('Request rejected.', 'info');
        loadPageData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    function formatMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^## (.+)$/gm, '<h3 style="margin:12px 0 8px;font-size:16px;">$1</h3>')
        .replace(/^### (.+)$/gm, '<h4 style="margin:10px 0 6px;font-size:14px;color:var(--gray-600);">$1</h4>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--gray-200);margin:16px 0;">')
        .replace(/\n/g, '<br>');
    }

    loadPageData();
  </script>
</body>
</html>
