name: "\U0001F504 Request a Change"
description: Submit a change request for infrastructure, application, or configuration changes.
title: "[CHANGE] "
labels: ["change-request", "pending-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Change Request
        All changes to production systems must go through this process.
        Refer to the [Change Management Policy](../docs/runbooks/change_management.md) for guidelines.

  - type: dropdown
    id: change_type
    attributes:
      label: Change Type
      description: What kind of change is this?
      options:
        - "Standard - Pre-approved, low risk (e.g., patching, scaling)"
        - "Normal - Requires review and approval"
        - "Emergency - Urgent fix for active incident"
    validations:
      required: true

  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      description: What is the risk if this change goes wrong?
      options:
        - "Low - No service impact expected"
        - "Medium - Possible brief disruption"
        - "High - Potential outage or data impact"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Target Environment
      options:
        - "Production"
        - "Staging"
        - "Development"
        - "All environments"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Change Description
      description: What are you changing and why?
      placeholder: |
        What: Upgrade Azure SQL Database from Standard to Premium tier
        Why: Performance issues during peak hours, need more DTUs
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: What services/users will be affected? What is the expected downtime?
      placeholder: |
        Services affected: CRM Application, Reporting Dashboard
        Users affected: ~200 users
        Expected downtime: 5 minutes during failover
    validations:
      required: true

  - type: textarea
    id: rollback_plan
    attributes:
      label: Rollback Plan
      description: How will you undo this change if something goes wrong?
      placeholder: |
        1. Restore database from point-in-time backup
        2. Revert tier to Standard in Azure Portal
        3. Verify application connectivity
    validations:
      required: true

  - type: input
    id: scheduled_date
    attributes:
      label: Proposed Schedule
      description: When should this change be implemented?
      placeholder: "2026-03-05 22:00 UTC (maintenance window)"
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing Performed
      description: What testing has been done in non-production environments?
      placeholder: "Tested in staging environment on 2026-02-27. No issues found."
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-Change Checklist
      options:
        - label: Tested in non-production environment
        - label: Rollback plan documented
        - label: Stakeholders notified
        - label: Backup taken (if applicable)
        - label: Monitoring alerts configured
