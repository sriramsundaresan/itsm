name: "Incident Triage & SLA Tracking"

on:
  issues:
    types: [opened, edited, labeled]

jobs:
  triage-incident:
    if: contains(github.event.issue.labels.*.name, 'incident')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Parse Severity from Issue Body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Parse severity
            let severity = 'unknown';
            let slaHours = 48;
            let priorityLabel = 'priority-low';

            if (body.includes('Critical')) {
              severity = 'critical';
              slaHours = 1;
              priorityLabel = 'priority-critical';
            } else if (body.includes('High')) {
              severity = 'high';
              slaHours = 4;
              priorityLabel = 'priority-high';
            } else if (body.includes('Medium')) {
              severity = 'medium';
              slaHours = 8;
              priorityLabel = 'priority-medium';
            } else if (body.includes('Low')) {
              severity = 'low';
              slaHours = 48;
              priorityLabel = 'priority-low';
            }

            // Parse affected service
            let service = 'unknown';
            const services = [
              'Email / Exchange Online',
              'VPN / Remote Access',
              'Azure Virtual Machines',
              'Azure SQL Database',
              'Microsoft 365 / Teams',
              'Azure DevOps',
              'Azure Networking',
              'Azure Storage',
              'Identity / Azure AD'
            ];
            for (const s of services) {
              if (body.includes(s)) {
                service = s;
                break;
              }
            }

            // Determine team assignment based on service
            let team = 'cloud-ops-team';
            if (service.includes('Email') || service.includes('365') || service.includes('Teams')) {
              team = 'm365-team';
            } else if (service.includes('Identity') || service.includes('Azure AD')) {
              team = 'identity-team';
            } else if (service.includes('Networking') || service.includes('VPN')) {
              team = 'network-team';
            } else if (service.includes('SQL') || service.includes('Database')) {
              team = 'data-team';
            }

            const slaDeadline = new Date(Date.now() + slaHours * 60 * 60 * 1000).toISOString();

            core.setOutput('severity', severity);
            core.setOutput('sla_hours', slaHours);
            core.setOutput('priority_label', priorityLabel);
            core.setOutput('service', service);
            core.setOutput('team', team);
            core.setOutput('sla_deadline', slaDeadline);

      - name: Apply Priority Label
        uses: actions/github-script@v7
        with:
          script: |
            const priorityLabel = '${{ steps.parse.outputs.priority_label }}';

            // Remove any existing priority labels
            const currentLabels = context.payload.issue.labels.map(l => l.name);
            for (const label of currentLabels) {
              if (label.startsWith('priority-')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label
                }).catch(() => {});
              }
            }

            // Add new priority label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [priorityLabel, 'triaged']
            });

            // Remove triage label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'triage'
            }).catch(() => {});

      - name: Post Triage Summary
        uses: actions/github-script@v7
        with:
          script: |
            const severity = '${{ steps.parse.outputs.severity }}';
            const slaHours = '${{ steps.parse.outputs.sla_hours }}';
            const service = '${{ steps.parse.outputs.service }}';
            const team = '${{ steps.parse.outputs.team }}';
            const slaDeadline = '${{ steps.parse.outputs.sla_deadline }}';

            const severityEmoji = {
              'critical': '🔴',
              'high': '🟠',
              'medium': '🟡',
              'low': '🟢'
            };

            const comment = `## 🤖 Auto-Triage Summary

            | Field | Value |
            |-------|-------|
            | **Severity** | ${severityEmoji[severity] || '⚪'} ${severity.toUpperCase()} |
            | **Affected Service** | ${service} |
            | **Assigned Team** | \`@${team}\` |
            | **SLA** | ${slaHours} hours |
            | **SLA Deadline** | ${slaDeadline} |

            ---
            
            ### Next Steps
            1. ✅ Incident triaged automatically
            2. ⏳ Assigned team will investigate
            3. 📊 SLA timer started — resolve by **${new Date(slaDeadline).toLocaleString()}**
            
            > _This is an automated triage. If the severity or assignment is incorrect, update the issue and re-triage will occur._
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  sla-breach-check:
    if: contains(github.event.issue.labels.*.name, 'incident')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    needs: triage-incident

    steps:
      - name: Schedule SLA Reminder
        uses: actions/github-script@v7
        with:
          script: |
            // This step logs the SLA for tracking
            // In production, use a scheduled workflow to check for breaches
            console.log(`SLA tracking registered for issue #${context.issue.number}`);
            console.log(`Created at: ${context.payload.issue.created_at}`);
