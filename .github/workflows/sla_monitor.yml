name: "SLA Breach Monitor"

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:       # Allow manual trigger

jobs:
  check-sla:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check Open Incidents for SLA Breach
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();

            // SLA definitions (in hours)
            const slaMap = {
              'priority-critical': 1,
              'priority-high': 4,
              'priority-medium': 8,
              'priority-low': 48
            };

            // Get all open incidents
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'incident,triaged',
              state: 'open',
              per_page: 100
            });

            for (const issue of issues.data) {
              const createdAt = new Date(issue.created_at);
              const hoursOpen = (now - createdAt) / (1000 * 60 * 60);

              // Find priority label
              const priorityLabel = issue.labels.find(l => l.name.startsWith('priority-'));
              if (!priorityLabel) continue;

              const slaHours = slaMap[priorityLabel.name] || 48;
              const isBreached = hoursOpen > slaHours;
              const isWarning = hoursOpen > (slaHours * 0.75);
              const alreadyBreached = issue.labels.some(l => l.name === 'sla-breached');
              const alreadyWarned = issue.labels.some(l => l.name === 'sla-warning');

              if (isBreached && !alreadyBreached) {
                // SLA BREACHED
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['sla-breached']
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## 🚨 SLA BREACHED

            | Metric | Value |
            |--------|-------|
            | **SLA Target** | ${slaHours} hours |
            | **Time Open** | ${hoursOpen.toFixed(1)} hours |
            | **Overdue By** | ${(hoursOpen - slaHours).toFixed(1)} hours |

            **This incident has exceeded its SLA target.**
            Escalating to @incident-managers for immediate attention.

            > _Automated SLA monitoring — runs every hour_`
                });

              } else if (isWarning && !alreadyWarned && !alreadyBreached) {
                // SLA WARNING (75% of time used)
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['sla-warning']
                });

                const remainingHours = (slaHours - hoursOpen).toFixed(1);

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `## ⚠️ SLA Warning

            **${remainingHours} hours remaining** before SLA breach.

            | Metric | Value |
            |--------|-------|
            | **SLA Target** | ${slaHours} hours |
            | **Time Open** | ${hoursOpen.toFixed(1)} hours |
            | **Remaining** | ${remainingHours} hours |

            Please prioritize resolution of this incident.

            > _Automated SLA monitoring — runs every hour_`
                });
              }
            }

            console.log(`Checked ${issues.data.length} open incidents for SLA compliance.`);
