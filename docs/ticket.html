<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://api.github.com; img-src 'self' data:; font-src 'self';">
  <title>Request Detail - Cloud Service Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="top-nav">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span class="logo-text">Cloud Service Management</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="tickets.html" class="active">Requests</a></li>
      <li><a href="new-ticket.html">New Request</a></li>
      <li><a href="catalog.html">Service Catalog</a></li>
    </ul>
    <div class="nav-right">
      <span id="roleBadge" class="role-badge"></span>
      <button class="settings-btn" onclick="showSettings()" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      </button>
    </div>
  </nav>

  <div class="main-content">
    <div style="margin-bottom:16px">
      <a href="tickets.html" style="color:var(--primary);text-decoration:none;font-size:14px;">← Back to Requests</a>
    </div>

    <!-- Request Header -->
    <div class="card" id="requestHeader">
      <div class="loading"><div class="spinner"></div>Loading request...</div>
    </div>

    <!-- Two Column Layout -->
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">

      <!-- Left: Description & Comments -->
      <div>
        <div class="card" id="requestBody">
          <div class="card-header"><h2>Description</h2></div>
          <div id="requestDescription" style="white-space:pre-wrap;font-size:14px;line-height:1.7;"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>Activity</h2>
          </div>
          <div id="requestComments">
            <div class="loading"><div class="spinner"></div>Loading...</div>
          </div>

          <!-- Add Comment -->
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-200);">
            <div class="form-group">
              <label>Add a Comment</label>
              <textarea id="newComment" placeholder="Write your update here..." style="min-height:80px" maxlength="65536"></textarea>
            </div>
            <button class="btn btn-primary btn-sm" onclick="addComment()">Post Comment</button>
          </div>
        </div>
      </div>

      <!-- Right: Sidebar -->
      <div>
        <div class="card">
          <h3 style="font-size:14px;color:var(--gray-500);margin-bottom:12px;">DETAILS</h3>
          <div id="requestSidebar" style="font-size:14px;">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>

        <div class="card">
          <h3 style="font-size:14px;color:var(--gray-500);margin-bottom:12px;">ACTIONS</h3>
          <div style="display:flex;flex-direction:column;gap:8px;" id="requestActions"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>⚙️ Portal Settings</h2>
      <div class="form-group">
        <label>Organization Name</label>
        <input type="text" id="settingsOrg" placeholder="Cloud Service Management">
      </div>
      <div class="form-group">
        <label>GitHub Repository <span class="required">*</span></label>
        <input type="text" id="settingsRepo" placeholder="owner/cloud-ops-backlog">
      </div>
      <div class="form-group">
        <label>GitHub Token <span class="required">*</span></label>
        <input type="password" id="settingsToken" placeholder="ghp_...">
      </div>
      <div class="form-group">
        <label>GitHub Username <span class="required">*</span></label>
        <input type="text" id="settingsUsername" placeholder="your-github-username">
      </div>
      <div class="form-group">
        <label>Role <span class="required">*</span></label>
        <select id="settingsRole">
          <option value="user">👤 User</option>
          <option value="admin">🛡️ Cloud Ops</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
        <button class="btn btn-secondary" onclick="hideSettings()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/github-api.js"></script>
  <script>
    document.querySelector('.logo-text').textContent = CloudOps.config.orgName;
    applyRoleUI();
    const requestId = new URLSearchParams(location.search).get('id');
    let currentRequest = null;

    async function loadPageData() {
      if (!checkConfig() || !requestId) return;

      try {
        const [request, comments] = await Promise.all([
          CloudOps.getRequest(requestId),
          CloudOps.getRequestComments(requestId)
        ]);
        currentRequest = request;

        const typeDef = CloudOps.getRequestTypeDef(request);
        const env = CloudOps.getEnvironment(request);
        const dataClass = CloudOps.getDataClassification(request);
        const isOpen = request.state === 'open';
        const safeTitle = CloudOps.escapeHtml(request.title);
        const safeNumber = parseInt(request.number, 10);

        document.title = `#${safeNumber} ${safeTitle} - Cloud Service Management`;

        // Header
        document.getElementById('requestHeader').innerHTML = `
          <div class="ticket-detail-header">
            <div>
              <div class="ticket-id">#${safeNumber}</div>
              <div class="ticket-title">${safeTitle}</div>
              <div class="ticket-meta">
                <span><span class="badge badge-${CloudOps.escapeHtml(typeDef.badge)}">${CloudOps.escapeHtml(typeDef.icon)} ${CloudOps.escapeHtml(typeDef.name)}</span></span>
                ${env !== 'none' ? `<span><span class="badge badge-${CloudOps.escapeHtml(env)}">${CloudOps.escapeHtml(env)}</span></span>` : ''}
                ${dataClass !== 'none' ? `<span><span class="badge badge-${CloudOps.escapeHtml(dataClass)}">${CloudOps.escapeHtml(dataClass)}</span></span>` : ''}
                <span><span class="badge badge-${isOpen ? 'open' : 'closed'}">${isOpen ? 'Open' : 'Closed'}</span></span>
              </div>
            </div>
          </div>
        `;

        // Description
        const body = request.body || 'No description provided.';
        document.getElementById('requestDescription').innerHTML = formatMarkdown(body);

        // Sidebar
        document.getElementById('requestSidebar').innerHTML = `
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Submitted by</div>
            <div>${request.user ? CloudOps.escapeHtml(request.user.login) : 'Unknown'}</div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Created</div>
            <div>${CloudOps.escapeHtml(CloudOps.formatDate(request.created_at))}</div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Updated</div>
            <div>${CloudOps.escapeHtml(CloudOps.formatDate(request.updated_at))}</div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Assignee</div>
            <div>${request.assignee ? CloudOps.escapeHtml(request.assignee.login) : 'Unassigned'}</div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="color:var(--gray-400);font-size:12px;margin-bottom:2px;">Labels</div>
            <div>${request.labels.map(l => `<span class="badge" style="background:#${CloudOps.escapeHtml(l.color)}22;color:#${CloudOps.escapeHtml(l.color)};border:1px solid #${CloudOps.escapeHtml(l.color)}44;margin:2px;">${CloudOps.escapeHtml(l.name)}</span>`).join(' ')}</div>
          </div>
        `;

        // Actions
        const actions = document.getElementById('requestActions');
        const isOwner = request.user && request.user.login.toLowerCase() === (CloudOps.config.username || '').toLowerCase();
        const canClose = CloudOps.config.isAdmin || isOwner;

        if (isOpen && canClose) {
          actions.innerHTML = `
            <button class="btn btn-success btn-sm" onclick="closeRequest()">✅ Close Request</button>
            ${CloudOps.config.isAdmin ? `<button class="btn btn-secondary btn-sm" onclick="markDecommission()">🗑️ Mark for Decommission</button>` : ''}
          `;
        } else if (!isOpen) {
          actions.innerHTML = `<div style="color:var(--gray-400);font-size:13px;">This request is closed.</div>`;
        } else {
          actions.innerHTML = `<div style="color:var(--gray-400);font-size:13px;">No actions available for your role.</div>`;
        }

        // Comments
        const commentsDiv = document.getElementById('requestComments');
        if (comments.length === 0) {
          commentsDiv.innerHTML = '<div style="color:var(--gray-400);font-size:14px;padding:12px 0;">No activity yet.</div>';
        } else {
          commentsDiv.innerHTML = comments.map(c => `
            <div style="padding:12px 0;border-bottom:1px solid var(--gray-100);">
              <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <strong style="font-size:13px;">${CloudOps.escapeHtml(c.user.login)}</strong>
                <span style="font-size:12px;color:var(--gray-400);">${CloudOps.escapeHtml(CloudOps.timeAgo(c.created_at))}</span>
              </div>
              <div style="font-size:14px;white-space:pre-wrap;line-height:1.6;">${formatMarkdown(c.body)}</div>
            </div>
          `).join('');
        }

      } catch (err) {
        showToast('Error: ' + err.message, 'error');
        document.getElementById('requestHeader').innerHTML = '<div class="empty-state">Request not found</div>';
      }
    }

    async function addComment() {
      const text = document.getElementById('newComment').value.trim();
      if (!text) { showToast('Please write a comment', 'error'); return; }
      try {
        await CloudOps.addComment(requestId, text);
        document.getElementById('newComment').value = '';
        showToast('Comment posted!', 'success');
        loadPageData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function closeRequest() {
      if (!confirm('CONFIRM: Close request #' + requestId + '?\n\nThis will mark the request as completed.')) return;
      try {
        await CloudOps.closeRequest(requestId);
        showToast('Request closed!', 'success');
        loadPageData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function markDecommission() {
      if (!confirm('CONFIRM: Mark request #' + requestId + ' for decommission?\n\nThis will add the decommission label.')) return;
      try {
        await CloudOps.addLabels(requestId, ['decommission']);
        showToast('Marked for decommission.', 'success');
        loadPageData();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    function formatMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^## (.+)$/gm, '<h3 style="margin:12px 0 8px;font-size:16px;">$1</h3>')
        .replace(/^### (.+)$/gm, '<h4 style="margin:10px 0 6px;font-size:14px;color:var(--gray-600);">$1</h4>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--gray-200);margin:16px 0;">')
        .replace(/\n/g, '<br>');
    }

    loadPageData();
  </script>
</body>
</html>
