<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://api.github.com; img-src 'self' data:; font-src 'self';">
  <title>Requests - Cloud Service Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="top-nav">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span class="logo-text">Cloud Service Management</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="tickets.html" class="active">Requests</a></li>
      <li><a href="new-ticket.html">New Request</a></li>
      <li><a href="catalog.html">Service Catalog</a></li>
    </ul>
    <div class="nav-right">
      <span id="roleBadge" class="role-badge"></span>
      <button class="settings-btn" onclick="showSettings()" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      </button>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h1>All Requests</h1>
      <p>View and manage cloud service requests</p>
    </div>

    <!-- Filters -->
    <div class="card">
      <div class="filter-bar">
        <select id="filterState" onchange="loadPageData()">
          <option value="open">Open</option>
          <option value="closed">Closed</option>
          <option value="all">All</option>
        </select>
        <select id="filterType" onchange="loadPageData()">
          <option value="">All Types</option>
          <option value="environment">🏗️ Environment</option>
          <option value="iam">🔑 Identity & Access</option>
          <option value="network">🌐 Network</option>
          <option value="platform">⚙️ Platform</option>
          <option value="security-exception">🛡️ Security Exception</option>
        </select>
        <select id="filterEnv" onchange="loadPageData()">
          <option value="">All Environments</option>
          <option value="sandbox">Sandbox</option>
          <option value="dev">Dev</option>
          <option value="uat">UAT</option>
        </select>
        <input type="text" class="search-input" id="filterSearch" placeholder="🔍 Search requests..." oninput="filterTable()">
        <a href="new-ticket.html" class="btn btn-primary btn-sm">+ New Request</a>
      </div>
    </div>

    <!-- Requests Table -->
    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Type</th>
              <th>Environment</th>
              <th>Classification</th>
              <th>Status</th>
              <th>Created</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="requestsBody">
            <tr><td colspan="8" class="loading"><div class="spinner"></div>Loading requests...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>⚙️ Portal Settings</h2>
      <div class="form-group">
        <label>Organization Name</label>
        <input type="text" id="settingsOrg" placeholder="Cloud Service Management">
      </div>
      <div class="form-group">
        <label>GitHub Repository <span class="required">*</span></label>
        <input type="text" id="settingsRepo" placeholder="owner/cloud-ops-backlog">
      </div>
      <div class="form-group">
        <label>GitHub Token <span class="required">*</span></label>
        <input type="password" id="settingsToken" placeholder="ghp_...">
      </div>
      <div class="form-group">
        <label>GitHub Username <span class="required">*</span></label>
        <input type="text" id="settingsUsername" placeholder="your-github-username">
      </div>
      <div class="form-group">
        <label>Role <span class="required">*</span></label>
        <select id="settingsRole">
          <option value="user">👤 User</option>
          <option value="admin">🛡️ Cloud Ops</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
        <button class="btn btn-secondary" onclick="hideSettings()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/github-api.js"></script>
  <script>
    document.querySelector('.logo-text').textContent = CloudOps.config.orgName;
    applyRoleUI();
    let allRequests = [];

    async function loadPageData() {
      if (!checkConfig()) return;

      const tbody = document.getElementById('requestsBody');
      tbody.innerHTML = '<tr><td colspan="8" class="loading"><div class="spinner"></div>Loading...</td></tr>';

      const state = document.getElementById('filterState').value;
      const typeFilter = document.getElementById('filterType').value;
      const envFilter = document.getElementById('filterEnv').value;

      const headerEl = document.querySelector('.page-header h1');
      const descEl = document.querySelector('.page-header p');
      if (CloudOps.config.isUser) {
        headerEl.textContent = 'My Requests';
        descEl.textContent = 'View requests you have submitted';
      } else {
        headerEl.textContent = 'All Requests';
        descEl.textContent = 'View and manage all cloud service requests';
      }

      try {
        const labels = [typeFilter, envFilter].filter(Boolean).join(',');

        let requests;
        if (state === 'all') {
          const [open, closed] = await Promise.all([
            CloudOps.getMyRequests({ state: 'open', labels }),
            CloudOps.getMyRequests({ state: 'closed', labels })
          ]);
          requests = [...open, ...closed].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        } else {
          requests = await CloudOps.getMyRequests({ state, labels });
        }

        allRequests = requests;
        renderTable(requests);
      } catch (err) {
        showToast('Error loading requests: ' + err.message, 'error');
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Error loading requests</td></tr>';
      }
    }

    function renderTable(requests) {
      const tbody = document.getElementById('requestsBody');
      if (requests.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div class="empty-icon">📭</div><h3>No requests found</h3></td></tr>';
        return;
      }

      tbody.innerHTML = requests.map(t => {
        const typeDef = CloudOps.getRequestTypeDef(t);
        const env = CloudOps.getEnvironment(t);
        const dataClass = CloudOps.getDataClassification(t);
        const isOpen = t.state === 'open';
        const safeTitle = CloudOps.escapeHtml(t.title);
        const safeNumber = parseInt(t.number, 10);

        return `<tr onclick="window.location='ticket.html?id=${safeNumber}'" style="cursor:pointer">
          <td><strong>#${safeNumber}</strong></td>
          <td>${safeTitle}</td>
          <td><span class="badge badge-${CloudOps.escapeHtml(typeDef.badge)}">${CloudOps.escapeHtml(typeDef.icon)} ${CloudOps.escapeHtml(typeDef.name)}</span></td>
          <td>${env !== 'none' ? `<span class="badge badge-${CloudOps.escapeHtml(env)}">${CloudOps.escapeHtml(env)}</span>` : '—'}</td>
          <td>${dataClass !== 'none' ? `<span class="badge badge-${CloudOps.escapeHtml(dataClass)}">${CloudOps.escapeHtml(dataClass)}</span>` : '—'}</td>
          <td><span class="badge badge-${isOpen ? 'open' : 'closed'}">${isOpen ? 'Open' : 'Closed'}</span></td>
          <td>${CloudOps.escapeHtml(CloudOps.timeAgo(t.created_at))}</td>
          <td>${CloudOps.escapeHtml(CloudOps.timeAgo(t.updated_at))}</td>
        </tr>`;
      }).join('');
    }

    function filterTable() {
      const search = document.getElementById('filterSearch').value.toLowerCase();
      if (!search) { renderTable(allRequests); return; }
      const filtered = allRequests.filter(t =>
        t.title.toLowerCase().includes(search) ||
        ('#' + t.number).includes(search)
      );
      renderTable(filtered);
    }

    loadPageData();
  </script>
</body>
</html>
